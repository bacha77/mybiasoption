services:
  - type: web
    name: mybiasoption
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 10000
      - key: FINNHUB_API_KEY
        sync: false
        required: true
      - key: SUPABASE_URL
        sync: false
        required: true
      - key: SUPABASE_ANON_KEY
        sync: false
        required: true
      - key: SIM_BALANCE
        value: "10000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
        required: false
      - key: TELEGRAM_CHAT_ID
        sync: false
        required: false
